packages:
  - frontend
  - backend
  - mobile

catalog:
  '@typescript/native': npm:typescript@^7.0.2
  typescript: ~6.0.3

allowBuilds:
  esbuild: true
  sharp: true

minimumReleaseAgeExclude:
  - shell-quote@1.10.0

overrides:
  '@react-native/dev-middleware>ws': 7.5.11
  brace-expansion@5: 5.0.7
  fast-uri: 3.1.2
  lightningcss: 1.30.1
  'metro>ws': 7.5.11
  postcss: 8.5.19
  'react-devtools-core>ws': 7.5.11
  'react-native>ws': 7.5.11
  shell-quote: 1.10.0
packageExtensions:
  '@react-native-google-signin/google-signin@*':
    dependencies:
      '@expo/config-plugins': '*'
